name: DataWrangler-Env
version: 0.1.0
description: A real-world task simulation for data cleaning and transformation.
entry_point: server/app.py
tags:
  - data-wrangling
  - pandas
  - agent-benchmarking
  - openenv

observation_space:
  type: DataWranglerObservation
  module: models

action_space:
  type: DataWranglerAction
  module: models

reward_space:
  type: DataWranglerReward
  module: models

state_space:
  type: EnvState
  module: models

endpoints:
  reset:
    method: POST
    path: /reset
  step:
    method: POST
    path: /step
  state:
    method: GET
    path: /state
  tasks:
    method: GET
    path: /tasks
  grade:
    method: POST
    path: /grade/{task_id}

max_steps: 10

tasks:
  - id: easy
    difficulty: easy
    objective: Drop null/invalid Price rows and cast Price to float.
    grader:
      endpoint: /grade/easy
      method: POST
      score_range: [0, 1]
      score_exclusive: true

  - id: medium
    difficulty: medium
    objective: Deduplicate users, standardize dates, fill missing emails.
    grader:
      endpoint: /grade/medium
      method: POST
      score_range: [0, 1]
      score_exclusive: true

  - id: hard
    difficulty: hard
    objective: Fix column names, drop redundant column, remove outliers.
    grader:
      endpoint: /grade/hard
      method: POST
      score_range: [0, 1]
      score_exclusive: true

  - id: easy_sample
    difficulty: easy
    objective: Fill missing Stock values with 0.
    grader:
      endpoint: /grade/easy_sample
      method: POST
      score_range: [0, 1]
      score_exclusive: true

  - id: medium_sample
    difficulty: medium
    objective: Rename salary column, cast to float, drop dept_code.
    grader:
      endpoint: /grade/medium_sample
      method: POST
      score_range: [0, 1]
      score_exclusive: true

  - id: hard_sample
    difficulty: hard
    objective: Drop null readings, remove outliers, cast timestamp to datetime.
    grader:
      endpoint: /grade/hard_sample
      method: POST
      score_range: [0, 1]
      score_exclusive: true
