name: DataWrangler-Env
version: 0.1.0
description: A real-world task simulation for data cleaning and transformation.
entry_point: app.py
tags:
  - data-wrangling
  - pandas
  - agent-benchmarking
  - openenv

observation_space:
  type: DataWranglerObservation
  module: models

action_space:
  type: DataWranglerAction
  module: models

reward_space:
  type: DataWranglerReward
  module: models

state_space:
  type: EnvState
  module: models

endpoints:
  reset:
    method: POST
    path: /reset
    description: Reset the environment to a given task. Returns initial observation.
  step:
    method: POST
    path: /step
    description: Execute one action. Returns observation, reward, done, info.
  state:
    method: GET
    path: /state
    description: Returns the current internal environment state.
  tasks:
    method: GET
    path: /tasks
    description: List all tasks with grader metadata.
  grade:
    method: POST
    path: /grade/{task_id}
    description: Run the grader for a specific task. Returns score strictly in (0, 1).

max_steps: 10

tasks:
  - id: easy
    difficulty: easy
    objective: Clean a simple sales dataset with formatting and null issues.
    grader:
      endpoint: /grade/easy
      method: POST
      score_range: [0, 1]
      score_exclusive: true

  - id: medium
    difficulty: medium
    objective: Standardize user data by removing duplicates and formatting dates.
    grader:
      endpoint: /grade/medium
      method: POST
      score_range: [0, 1]
      score_exclusive: true

  - id: hard
    difficulty: hard
    objective: Normalize financial records with malformed column names and outliers.
    grader:
      endpoint: /grade/hard
      method: POST
      score_range: [0, 1]
      score_exclusive: true
